{% extends 'base.html' %}

{% block title %}Bot Bozori - BaxtiyorAiTest{% endblock %}

{% block content %}
<div class="p-6 max-w-7xl mx-auto">
    
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
        <div>
            <h1 class="text-4xl font-bold">Bot Bozori</h1>
            <p class="text-gray-400">Minglab custom AI botlar orasidan tanlang</p>
        </div>
        
        <div class="flex gap-4 w-full md:w-auto">
            <input type="text" id="search-bots" placeholder="Bot qidirish..." 
                   onkeyup="searchBots()"
                   class="flex-1 md:w-80 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-purple-500">
            
            <select id="category-filter" onchange="filterBots()" 
                    class="bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-purple-500">
                <option value="">Barcha kategoriyalar</option>
                <option value="Assistant">Yordamchi</option>
                <option value="Coding">Dasturlash</option>
                <option value="Creative">Ijodiy</option>
                <option value="Tutor">O'qituvchi</option>
                <option value="Roleplay">Roleplay</option>
            </select>
        </div>
    </div>

    <!-- Featured Bots -->
    <div class="mb-12">
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
            <span class="text-yellow-400">⭐</span> 
            Featured & Verified Bots
        </h2>
        <div id="featured-bots" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- JavaScript orqali to'ldiriladi -->
        </div>
    </div>

    <!-- All Bots -->
    <div>
        <h2 class="text-2xl font-semibold mb-6">Barcha Botlar</h2>
        <div id="all-bots-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- JavaScript orqali to'ldiriladi -->
        </div>
    </div>

    <!-- Load More -->
    <div class="flex justify-center mt-12">
        <button onclick="loadMoreBots()" 
                class="px-10 py-4 border border-white/30 hover:bg-white/5 rounded-2xl flex items-center gap-3 transition-all">
            <i class="fas fa-chevron-down"></i>
            Yana yuklash
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/bot.js"></script>
<script>
    // Sahifa yuklanganda bozorni yuklash
    document.addEventListener('DOMContentLoaded', function() {
        loadMarketplace();
    });
</script>
{% endblock %}
